name: Build Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for artifacts (e.g., 2026.5.26)'
        required: true
        default: '2026.5.26'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux-x64
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            name: Linux-arm64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            name: Linux-musl-x64
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-musl
            name: Linux-musl-arm64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install admin-ui dependencies
        working-directory: admin-ui
        run: pnpm install

      - name: Build admin-ui
        working-directory: admin-ui
        run: pnpm build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-cache-${{ matrix.target }}"
          cache-on-failure: true

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build app
        run: cargo build --release --target ${{ matrix.target }} ${{ contains(matrix.target, 'musl') && '--no-default-features' || '' }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xkiro-rs-${{ steps.version.outputs.version }}-${{ matrix.name }}
          if-no-files-found: error
          compression-level: 6
          path: |
            target/${{ matrix.target }}/release/xkiro-rs
            target/${{ matrix.target }}/release/xkiro-rs.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package per-platform archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          cd artifacts
          for d in xkiro-rs-${VERSION}-*; do
            [ -d "$d" ] || continue
            NAME="$d"
            if compgen -G "$d/xkiro-rs.exe" > /dev/null; then
              (cd "$d" && zip -9 -r "../../dist/${NAME}.zip" .)
            else
              chmod +x "$d/xkiro-rs" || true
              tar -C "$d" -czf "../dist/${NAME}.tar.gz" xkiro-rs
            fi
          done
          cd ..
          (cd dist && sha256sum * > SHA256SUMS)
          ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: xkiro-rs ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*