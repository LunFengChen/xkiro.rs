name: Build and Push Docker Images

on:
  push:
    branches:
      - main        # main 推送：build + 推镜像（latest + sha 短标）
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for Docker images (e.g., 2026.5.26)'
        required: true
        default: '2026.5.26'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-22.04-arm
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # push 触发用 sha 短标，手动触发用输入的版本号
      - name: Compute image tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sha_tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "sha_tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          provenance: false
          tags: ghcr.io/${{ github.repository_owner }}/xkiro-rs:${{ steps.meta.outputs.sha_tag }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=xkiro-rs Docker Image

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Create and push multi-arch manifest
        run: |
          SHA_TAG="${{ needs.build.outputs.sha_tag }}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/xkiro-rs"

          # sha/version 标签的 manifest
          docker manifest create ${IMAGE}:${SHA_TAG} \
            ${IMAGE}:${SHA_TAG}-amd64 \
            ${IMAGE}:${SHA_TAG}-arm64
          docker manifest push ${IMAGE}:${SHA_TAG}

          # latest 始终跟着 main
          docker manifest create --amend ${IMAGE}:latest \
            ${IMAGE}:${SHA_TAG}-amd64 \
            ${IMAGE}:${SHA_TAG}-arm64
          docker manifest push ${IMAGE}:latest
